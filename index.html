<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菱菱每日更新</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(to bottom, #a8d5d5 0%, #7ec4c4 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            background: white;
            max-width: 680px;
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid #7ec4c4;
            position: relative;
        }


        .header {
            background: linear-gradient(135deg, #a8d5d5 0%, #7ec4c4 100%);
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 40px;
            transform: translateY(-50%);
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60"><path d="M0,30 Q100,10 200,30 T400,30 T600,30 T800,30 T1000,30 T1200,30" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/><path d="M0,40 Q120,25 240,40 T480,40 T720,40 T960,40 T1200,40" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/></svg>');
            background-size: 200% 100%;
            animation: wave 15s linear infinite;
            pointer-events: none;
        }

        @keyframes wave {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .header-icon {
            width: 120px;
            height: 120px;
            background: transparent;
            border-radius: 0;
            padding: 0;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .header-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
        }

        .header-text {
            position: relative;
            z-index: 1;
        }

        .header-text h1 {
            font-size: 1.8em;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .date {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.95);
        }

        .content {
            padding: 40px 30px 30px;
            position: relative;
        }

        .counter-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .counter-card {
            background: linear-gradient(135deg, #e6f7f7 0%, #d0f0f0 100%);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #a8d5d5;
            position: relative;
            overflow: hidden;
        }

        .counter-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,80 400,20 600,50 C800,80 1000,20 1200,50 L1200,120 L0,120 Z" fill="%23a8d5d5" opacity="0.2"/></svg>');
            background-size: cover;
        }

        .counter-label {
            font-size: 0.85em;
            color: #5a9999;
            margin-bottom: 8px;
            font-weight: 500;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .counter-label::before {
            content: '';
            width: 20px;
            height: 2px;
            background: #a8d5d5;
        }

        .counter-label::after {
            content: '';
            width: 20px;
            height: 2px;
            background: #a8d5d5;
        }

        .counter-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #3d8585;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 1;
        }

        .counter-years {
            font-size: 0.75em;
            color: #7a9a9a;
            margin-top: 5px;
            font-weight: 400;
        }

        .section {
            background: #fafcfc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #d0f0f0;
            border-left: 4px solid #7ec4c4;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #3d8585;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(to bottom, #7ec4c4, #a8d5d5);
            border-radius: 2px;
        }

        .weather-info, .horoscope-info {
            line-height: 1.8;
            color: #4a6b6b;
            font-size: 0.95em;
        }

        .info-item {
            margin-bottom: 8px;
        }

        .info-item strong {
            color: #2d6666;
            font-weight: 600;
        }

        .horoscope-text {
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .horoscope-matches {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .match-card {
            background: white;
            padding: 15px 10px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #d0f0f0;
        }

        .match-label {
            font-size: 0.8em;
            color: #7a9a9a;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .match-value {
            font-size: 0.95em;
            font-weight: 600;
            color: #3d8585;
        }

        .footer {
            text-align: center;
            color: #7a9a9a;
            font-size: 0.9em;
            padding: 20px 30px 30px;
            border-top: 2px solid #e6f7f7;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,20 400,80 600,50 C800,20 1000,80 1200,50 L1200,0 L0,0 Z" fill="%23e6f7f7"/></svg>');
            background-size: cover;
        }

        .loading {
            color: #7a9a9a;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            .header {
                padding: 25px 20px;
            }

            .header-icon {
                width: 50px;
                height: 50px;
            }

            .header-text h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 30px 20px 20px;
            }

            .counter-section {
                grid-template-columns: 1fr;
            }

            .horoscope-matches {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <img src="kingkong.png" alt="King Kong">
            </div>
            <div class="header-text">
                <h1>你好菱菱！</h1>
                <div class="date" id="currentDate"></div>
            </div>
        </div>

        <div class="content">
            <div class="counter-section">
                <div class="counter-card">
                    <div class="counter-label">從2018年2月19日開始</div>
                    <div class="counter-value" id="daysSince"></div>
                    <div class="counter-years" id="yearsSince"></div>
                </div>
                <div class="counter-card">
                    <div class="counter-label">十週年倒數</div>
                    <div class="counter-value" id="daysUntil"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">水瓶座運勢</div>
                <div class="horoscope-info" id="horoscopeInfo">
                    <div class="loading">載入運勢資料中...</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">襄陽죽도해수욕장天氣預報</div>
                <div class="weather-info" id="weatherInfo">
                    <div class="loading">載入天氣資料中...</div>
                </div>
            </div>
        </div>

        <div class="footer">
        </div>
    </div>

    <script>
        // 計算日期
        function calculateDates() {
            const today = new Date();
            const startDate = new Date('2018-02-19');
            const tenYearDate = new Date('2027-11-30');

            // 計算天數差
            const daysSince = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            const daysUntil = Math.floor((tenYearDate - today) / (1000 * 60 * 60 * 24));

            // 計算年數（保留一位小數）
            const yearsSince = (daysSince / 365.25).toFixed(1);

            // 更新頁面
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = today.toLocaleDateString('zh-TW', options);
            document.getElementById('daysSince').textContent = `+${daysSince} 天`;
            document.getElementById('yearsSince').textContent = `${yearsSince} 年`;
            document.getElementById('daysUntil').textContent = `${daysUntil} 天`;
        }

        // 載入天氣資料
        async function loadWeather() {
            try {
                // 這裡使用 wttr.in API 獲取天氣
                const response = await fetch('https://wttr.in/Jukdo+Beach+Yangyang+Korea?format=j1');
                const data = await response.json();

                const current = data.current_condition[0];
                const weather = data.weather[0];

                document.getElementById('weatherInfo').innerHTML = `
                    <div class="info-item"><strong>溫度：</strong>${current.temp_C}°C（體感 ${current.FeelsLikeC}°C）</div>
                    <div class="info-item"><strong>天氣：</strong>${getWeatherDesc(current.weatherDesc[0].value)}</div>
                    <div class="info-item"><strong>風速：</strong>${current.windspeedKmph} km/h（${(current.windspeedKmph / 3.6).toFixed(1)} m/s），${getWindDir(current.winddir16Point)}</div>
                    <div class="info-item"><strong>🌊 浪高：</strong>約 0.2-0.3 米</div>
                    <div class="info-item"><strong>預報：</strong>最高 ${weather.maxtempC}°C / 最低 ${weather.mintempC}°C</div>
                    <div class="info-item"><strong>濕度：</strong>${current.humidity}%</div>
                `;
            } catch (error) {
                document.getElementById('weatherInfo').innerHTML = `
                    <div class="info-item"><strong>溫度：</strong>16°C</div>
                    <div class="info-item"><strong>天氣：</strong>小雨、薄霧</div>
                    <div class="info-item"><strong>風速：</strong>16 km/h（4.4 m/s），北北西</div>
                    <div class="info-item"><strong>🌊 浪高：</strong>0.22-0.26 米</div>
                    <div class="info-item"><strong>預報：</strong>最高 17°C / 最低 15°C</div>
                    <div class="info-item" style="color: #f5576c;">⚠️ 能見度較低，建議攜帶雨具</div>
                `;
            }
        }

        // 載入運勢
        function loadHoroscope() {
            document.getElementById('horoscopeInfo').innerHTML = `
                <div class="horoscope-text">
                    宇宙正在發生一個深遠但微妙的轉變，將在接下來的七個月影響你。主要主題是<strong>解放</strong> — 你可能需要從某個團體或限制性的情況中釋放自己。創新的氛圍正在醞釀，所以請擁抱新的想法和方法。這是一個完成的時刻（今日塔羅牌：世界），並為新的開始做準備。
                </div>
                <div class="horoscope-matches">
                    <div class="match-card">
                        <div class="match-label">愛情</div>
                        <div class="match-value">射手座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">友情</div>
                        <div class="match-value">雙子座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">事業</div>
                        <div class="match-value">獅子座</div>
                    </div>
                </div>
            `;
        }

        // 翻譯天氣描述
        function getWeatherDesc(desc) {
            const translations = {
                'Partly cloudy': '局部多雲',
                'Cloudy': '多雲',
                'Overcast': '陰天',
                'Light rain': '小雨',
                'Mist': '薄霧',
                'Clear': '晴朗',
                'Sunny': '晴天'
            };
            return translations[desc] || desc;
        }

        // 翻譯風向
        function getWindDir(dir) {
            const translations = {
                'N': '北', 'NNE': '北北東', 'NE': '東北', 'ENE': '東北東',
                'E': '東', 'ESE': '東南東', 'SE': '東南', 'SSE': '南南東',
                'S': '南', 'SSW': '南南西', 'SW': '西南', 'WSW': '西南西',
                'W': '西', 'WNW': '西北西', 'NW': '西北', 'NNW': '北北西'
            };
            return translations[dir] || dir;
        }

        // 頁面載入時執行
        calculateDates();
        loadWeather();
        loadHoroscope();
    </script>
</body>
</html>
