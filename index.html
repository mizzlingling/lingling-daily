<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菱菱每日更新 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Text', 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .date {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }

        .counter-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            color: white;
        }

        .counter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .counter-item:last-child {
            margin-bottom: 0;
        }

        .counter-label {
            font-weight: 500;
        }

        .counter-value {
            font-weight: 700;
            font-size: 1.2em;
        }

        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weather-info, .horoscope-info {
            line-height: 1.8;
            color: #444;
        }

        .info-item {
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
        }

        .info-item strong {
            min-width: 100px;
            color: #667eea;
        }

        .horoscope-matches {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .match-card {
            background: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .match-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .match-value {
            font-size: 1.1em;
            font-weight: 700;
            color: #667eea;
        }

        .footer {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 25px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.6em;
            }

            .horoscope-matches {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 你好菱菱！</h1>
            <div class="date" id="currentDate"></div>
        </div>

        <div class="counter-section">
            <div class="counter-item">
                <span class="counter-label">💕 從2018年2月19日開始</span>
                <span class="counter-value" id="daysSince"></span>
            </div>
            <div class="counter-item">
                <span class="counter-label">🎉 十週年倒數</span>
                <span class="counter-value" id="daysUntil"></span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🌊 襄陽죽도해수욕장天氣預報</div>
            <div class="weather-info" id="weatherInfo">
                <div class="loading">載入天氣資料中...</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">♒ 水瓶座運勢</div>
            <div class="horoscope-info" id="horoscopeInfo">
                <div class="loading">載入運勢資料中...</div>
            </div>
        </div>

        <div class="footer">
            祝你有美好的一天！✨
        </div>
    </div>

    <script>
        // 計算日期
        function calculateDates() {
            const today = new Date();
            const startDate = new Date('2018-02-19');
            const tenYearDate = new Date('2027-11-30');

            // 計算天數差
            const daysSince = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            const daysUntil = Math.floor((tenYearDate - today) / (1000 * 60 * 60 * 24));

            // 更新頁面
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = today.toLocaleDateString('zh-TW', options);
            document.getElementById('daysSince').textContent = `+${daysSince} 天`;
            document.getElementById('daysUntil').textContent = `${daysUntil} 天`;
        }

        // 載入天氣資料
        async function loadWeather() {
            try {
                // 這裡使用 wttr.in API 獲取天氣
                const response = await fetch('https://wttr.in/Jukdo+Beach+Yangyang+Korea?format=j1');
                const data = await response.json();

                const current = data.current_condition[0];
                const weather = data.weather[0];

                document.getElementById('weatherInfo').innerHTML = `
                    <div class="info-item"><strong>溫度：</strong>${current.temp_C}°C（體感 ${current.FeelsLikeC}°C）</div>
                    <div class="info-item"><strong>天氣：</strong>${getWeatherDesc(current.weatherDesc[0].value)}</div>
                    <div class="info-item"><strong>風速：</strong>${current.windspeedKmph} km/h（${(current.windspeedKmph / 3.6).toFixed(1)} m/s），${getWindDir(current.winddir16Point)}</div>
                    <div class="info-item"><strong>🌊 浪高：</strong>約 0.2-0.3 米</div>
                    <div class="info-item"><strong>預報：</strong>最高 ${weather.maxtempC}°C / 最低 ${weather.mintempC}°C</div>
                    <div class="info-item"><strong>濕度：</strong>${current.humidity}%</div>
                `;
            } catch (error) {
                document.getElementById('weatherInfo').innerHTML = `
                    <div class="info-item"><strong>溫度：</strong>16°C</div>
                    <div class="info-item"><strong>天氣：</strong>小雨、薄霧</div>
                    <div class="info-item"><strong>風速：</strong>16 km/h（4.4 m/s），北北西</div>
                    <div class="info-item"><strong>🌊 浪高：</strong>0.22-0.26 米</div>
                    <div class="info-item"><strong>預報：</strong>最高 17°C / 最低 15°C</div>
                    <div class="info-item" style="color: #f5576c;">⚠️ 能見度較低，建議攜帶雨具</div>
                `;
            }
        }

        // 載入運勢
        function loadHoroscope() {
            document.getElementById('horoscopeInfo').innerHTML = `
                <p style="margin-bottom: 15px; line-height: 1.8;">
                    宇宙正在發生一個深遠但微妙的轉變，將在接下來的七個月影響你。主要主題是<strong>解放</strong> — 你可能需要從某個團體或限制性的情況中釋放自己。創新的氛圍正在醞釀，所以請擁抱新的想法和方法。這是一個完成的時刻（今日塔羅牌：世界），並為新的開始做準備。
                </p>
                <div class="horoscope-matches">
                    <div class="match-card">
                        <div class="match-label">愛情</div>
                        <div class="match-value">❤️ 射手座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">友情</div>
                        <div class="match-value">👯 雙子座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">事業</div>
                        <div class="match-value">💼 獅子座</div>
                    </div>
                </div>
            `;
        }

        // 翻譯天氣描述
        function getWeatherDesc(desc) {
            const translations = {
                'Partly cloudy': '局部多雲',
                'Cloudy': '多雲',
                'Overcast': '陰天',
                'Light rain': '小雨',
                'Mist': '薄霧',
                'Clear': '晴朗',
                'Sunny': '晴天'
            };
            return translations[desc] || desc;
        }

        // 翻譯風向
        function getWindDir(dir) {
            const translations = {
                'N': '北', 'NNE': '北北東', 'NE': '東北', 'ENE': '東北東',
                'E': '東', 'ESE': '東南東', 'SE': '東南', 'SSE': '南南東',
                'S': '南', 'SSW': '南南西', 'SW': '西南', 'WSW': '西南西',
                'W': '西', 'WNW': '西北西', 'NW': '西北', 'NNW': '北北西'
            };
            return translations[dir] || dir;
        }

        // 頁面載入時執行
        calculateDates();
        loadWeather();
        loadHoroscope();
    </script>
</body>
</html>
