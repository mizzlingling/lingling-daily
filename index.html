<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菱菱每日更新</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(to bottom, #a8d5d5 0%, #7ec4c4 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            background: white;
            max-width: 680px;
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid #7ec4c4;
            position: relative;
        }


        .header {
            background: linear-gradient(135deg, #a8d5d5 0%, #7ec4c4 100%);
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 40px;
            transform: translateY(-50%);
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60"><path d="M0,30 Q100,10 200,30 T400,30 T600,30 T800,30 T1000,30 T1200,30" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" fill="none"/><path d="M0,40 Q120,25 240,40 T480,40 T720,40 T960,40 T1200,40" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/></svg>');
            background-size: 200% 100%;
            animation: wave 15s linear infinite;
            pointer-events: none;
        }

        @keyframes wave {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .header-icon {
            width: 120px;
            height: 120px;
            background: transparent;
            border-radius: 0;
            padding: 0;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .header-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
        }

        .header-text {
            position: relative;
            z-index: 1;
        }

        .header-text h1 {
            font-size: 1.8em;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .date {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.95);
        }

        .content {
            padding: 40px 30px 30px;
            position: relative;
        }

        .counter-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .counter-card {
            background: linear-gradient(135deg, #e6f7f7 0%, #d0f0f0 100%);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #a8d5d5;
            position: relative;
            overflow: hidden;
        }

        .counter-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,80 400,20 600,50 C800,80 1000,20 1200,50 L1200,120 L0,120 Z" fill="%23a8d5d5" opacity="0.2"/></svg>');
            background-size: cover;
        }

        .counter-label {
            font-size: 0.85em;
            color: #5a9999;
            margin-bottom: 8px;
            font-weight: 500;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .counter-label::before {
            content: '';
            width: 20px;
            height: 2px;
            background: #a8d5d5;
        }

        .counter-label::after {
            content: '';
            width: 20px;
            height: 2px;
            background: #a8d5d5;
        }

        .counter-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #3d8585;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 1;
        }

        .counter-years {
            font-size: 0.75em;
            color: #7a9a9a;
            margin-top: 5px;
            font-weight: 400;
        }

        .section {
            background: #fafcfc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #d0f0f0;
            border-left: 4px solid #7ec4c4;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #3d8585;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(to bottom, #7ec4c4, #a8d5d5);
            border-radius: 2px;
        }

        .horoscope-info {
            line-height: 1.8;
            color: #4a6b6b;
            font-size: 0.95em;
        }

        .quote-section {
            background: linear-gradient(135deg, #e6f7f7 0%, #d0f0f0 100%);
            border: 2px solid #a8d5d5;
            position: relative;
            overflow: hidden;
        }

        .quote-section::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,80 400,20 600,50 C800,80 1000,20 1200,50 L1200,120 L0,120 Z" fill="rgba(168,213,213,0.3)"/></svg>');
            background-size: cover;
            pointer-events: none;
        }

        .ocean-quote {
            text-align: center;
            padding: 20px 20px 25px;
            position: relative;
            z-index: 1;
        }

        .quote-text {
            font-size: 0.95em;
            font-style: italic;
            color: #2d6666;
            line-height: 1.6;
            margin-bottom: 10px;
            font-weight: 300;
            font-family: Georgia, 'Times New Roman', serif;
        }

        .quote-text::before {
            content: '"';
            font-size: 1.5em;
            color: #7ec4c4;
            opacity: 0.5;
            position: relative;
            top: 8px;
            margin-right: 3px;
        }

        .quote-text::after {
            content: '"';
            font-size: 1.5em;
            color: #7ec4c4;
            opacity: 0.5;
            position: relative;
            top: 8px;
            margin-left: 3px;
        }

        .quote-author {
            font-size: 0.8em;
            color: #5a9999;
            font-weight: 500;
        }

        .horoscope-text {
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .horoscope-matches {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .match-card {
            background: white;
            padding: 15px 10px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #d0f0f0;
        }

        .match-label {
            font-size: 0.8em;
            color: #7a9a9a;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .match-value {
            font-size: 0.95em;
            font-weight: 600;
            color: #3d8585;
        }

        .footer {
            text-align: center;
            color: #7a9a9a;
            font-size: 0.9em;
            padding: 20px 30px 30px;
            border-top: 2px solid #e6f7f7;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,20 400,80 600,50 C800,20 1000,80 1200,50 L1200,0 L0,0 Z" fill="%23e6f7f7"/></svg>');
            background-size: cover;
        }

        .loading {
            color: #7a9a9a;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            .header {
                padding: 25px 20px;
            }

            .header-icon {
                width: 50px;
                height: 50px;
            }

            .header-text h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 30px 20px 20px;
            }

            .counter-section {
                grid-template-columns: 1fr;
            }

            .horoscope-matches {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <img src="kingkong.png" alt="King Kong">
            </div>
            <div class="header-text">
                <h1>你好菱菱！</h1>
                <div class="date" id="currentDate"></div>
            </div>
        </div>

        <div class="content">
            <div class="counter-section">
                <div class="counter-card">
                    <div class="counter-label">LINEr</div>
                    <div class="counter-value" id="daysSince"></div>
                    <div class="counter-years" id="yearsSince"></div>
                </div>
                <div class="counter-card">
                    <div class="counter-label">十週年倒數</div>
                    <div class="counter-value" id="daysUntil"></div>
                </div>
            </div>

            <div class="section quote-section">
                <div class="section-title">今日海語</div>
                <div class="ocean-quote" id="oceanQuote">
                    <div class="loading">載入中...</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">水瓶座運勢</div>
                <div class="horoscope-info" id="horoscopeInfo">
                    <div class="loading">載入運勢資料中...</div>
                </div>
            </div>
        </div>

        <div class="footer">
        </div>
    </div>

    <script>
        // 計算日期
        function calculateDates() {
            const today = new Date();
            const startDate = new Date('2018-02-19');
            const tenYearDate = new Date('2027-11-30');

            // 計算天數差
            const daysSince = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            const daysUntil = Math.floor((tenYearDate - today) / (1000 * 60 * 60 * 24));

            // 計算年數（保留一位小數）
            const yearsSince = (daysSince / 365.25).toFixed(1);

            // 更新頁面
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = today.toLocaleDateString('zh-TW', options);
            document.getElementById('daysSince').textContent = `+${daysSince} 天`;
            document.getElementById('yearsSince').textContent = `${yearsSince} 年`;
            document.getElementById('daysUntil').textContent = `${daysUntil} 天`;
        }

        // Ocean Quotes Collection
        const oceanQuotes = [
            { text: "The sea, once it casts its spell, holds one in its net of wonder forever", author: "Jacques Cousteau" },
            { text: "To me the sea is a continual miracle; the fishes that swim, the rocks, the motion of the waves", author: "Walt Whitman" },
            { text: "The voice of the sea speaks to the soul", author: "Kate Chopin" },
            { text: "The ocean stirs the heart, inspires the imagination and brings eternal joy to the soul", author: "Robert Wyland" },
            { text: "The sea does not reward those who are too anxious, too greedy, or too impatient", author: "Anne Morrow Lindbergh" },
            { text: "In one drop of water are found all the secrets of all the oceans", author: "Kahlil Gibran" },
            { text: "The cure for anything is salt water: sweat, tears, or the sea", author: "Isak Dinesen" },
            { text: "We ourselves feel that what we are doing is just a drop in the ocean", author: "Mother Teresa" },
            { text: "The sea is emotion incarnate. It loves, hates, and weeps", author: "Christopher Paolini" },
            { text: "Why do we love the sea? It is because it has some potent power to make us think", author: "Robert Henri" },
            { text: "The ocean is everything I want to be: beautiful, mysterious, wild, and free", author: "Unknown" },
            { text: "Dance with the waves, move with the sea, let the rhythm of the water set your soul free", author: "Christy Ann Martine" },
            { text: "At the beach, life is different. Time doesn't move hour to hour but mood to moment", author: "Unknown" },
            { text: "The ocean is a mighty harmonist", author: "William Wordsworth" },
            { text: "How inappropriate to call this planet Earth when it is quite clearly Ocean", author: "Arthur C. Clarke" },
            { text: "The sea lives in every one of us", author: "Robert Wyland" },
            { text: "The pessimist complains about the wind; the optimist expects it to change; the realist adjusts the sails", author: "William Arthur Ward" },
            { text: "The sea is as near as we come to another world", author: "Anne Stevenson" },
            { text: "Individually, we are one drop. Together, we are an ocean", author: "Ryunosuke Satoro" },
            { text: "The ocean makes me feel really small and it makes me put my whole life into perspective", author: "Beyoncé" },
            { text: "There must be something strangely sacred in salt. It is in our tears and in the sea", author: "Kahlil Gibran" },
            { text: "I could never stay long enough on the shore; the tang of the untainted, fresh, and free sea air was like a cool, quieting thought", author: "Helen Keller" },
            { text: "The sea will grant each man new hope, and sleep will bring dreams of home", author: "Christopher Columbus" },
            { text: "The breaking of a wave cannot explain the whole sea", author: "Vladimir Nabokov" },
            { text: "Live in the sunshine, swim the sea, drink the wild air", author: "Ralph Waldo Emerson" },
            { text: "The sea, the great unifier, is man's only hope. Now, as never before, the old phrase has a literal meaning", author: "Jacques Cousteau" },
            { text: "No water, no life. No blue, no green", author: "Sylvia Earle" },
            { text: "The ocean is a central image. It is the symbolism of a great journey", author: "Enya" },
            { text: "Being out there in the ocean, God's creation, it's like a gift He has given us", author: "Bethany Hamilton" },
            { text: "The sea is only the embodiment of a supernatural and wonderful existence", author: "Jules Verne" },
            { text: "Each wave of the sea has a different light, just as the beauty of who you are", author: "Unknown" }
        ];

        // 根據日期選擇 Quote（每天不同）
        function loadOceanQuote() {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const quoteIndex = dayOfYear % oceanQuotes.length;
            const quote = oceanQuotes[quoteIndex];

            document.getElementById('oceanQuote').innerHTML = `
                <div class="quote-text">${quote.text}</div>
                <div class="quote-author">— ${quote.author}</div>
            `;
        }

        // 載入運勢
        function loadHoroscope() {
            document.getElementById('horoscopeInfo').innerHTML = `
                <div class="horoscope-text">
                    宇宙正在發生一個深遠但微妙的轉變，將在接下來的七個月影響你。主要主題是<strong>解放</strong> — 你可能需要從某個團體或限制性的情況中釋放自己。創新的氛圍正在醞釀，所以請擁抱新的想法和方法。這是一個完成的時刻（今日塔羅牌：世界），並為新的開始做準備。
                </div>
                <div class="horoscope-matches">
                    <div class="match-card">
                        <div class="match-label">愛情</div>
                        <div class="match-value">射手座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">友情</div>
                        <div class="match-value">雙子座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">事業</div>
                        <div class="match-value">獅子座</div>
                    </div>
                </div>
            `;
        }

        // 頁面載入時執行
        calculateDates();
        loadOceanQuote();
        loadHoroscope();
    </script>
</body>
</html>
