<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菱菱每日更新</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(to bottom, #a8d5d5 0%, #7ec4c4 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            background: white;
            max-width: 680px;
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid #7ec4c4;
            position: relative;
        }


        .header {
            background: linear-gradient(135deg, #a8d5d5 0%, #7ec4c4 100%);
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 40px;
            transform: translateY(-50%);
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60"><path d="M0,30 Q100,10 200,30 T400,30 T600,30 T800,30 T1000,30 T1200,30" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/><path d="M0,40 Q120,25 240,40 T480,40 T720,40 T960,40 T1200,40" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/></svg>');
            background-size: 200% 100%;
            animation: wave 15s linear infinite;
            pointer-events: none;
        }

        @keyframes wave {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .header-icon {
            width: 120px;
            height: 120px;
            background: transparent;
            border-radius: 0;
            padding: 0;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .header-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
        }

        .header-text {
            position: relative;
            z-index: 1;
        }

        .header-text h1 {
            font-size: 1.8em;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .date {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.95);
        }

        .content {
            padding: 40px 30px 30px;
            position: relative;
        }

        .counter-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .counter-card {
            background: linear-gradient(135deg, #e6f7f7 0%, #d0f0f0 100%);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #a8d5d5;
            position: relative;
            overflow: hidden;
        }

        .counter-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,80 400,20 600,50 C800,80 1000,20 1200,50 L1200,120 L0,120 Z" fill="%23a8d5d5" opacity="0.2"/></svg>');
            background-size: cover;
        }

        .counter-label {
            font-size: 0.85em;
            color: #5a9999;
            margin-bottom: 8px;
            font-weight: 500;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .counter-label::before {
            content: '';
            width: 20px;
            height: 2px;
            background: #a8d5d5;
        }

        .counter-label::after {
            content: '';
            width: 20px;
            height: 2px;
            background: #a8d5d5;
        }

        .counter-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #3d8585;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 1;
        }

        .counter-years {
            font-size: 0.75em;
            color: #7a9a9a;
            margin-top: 5px;
            font-weight: 400;
        }

        .section {
            background: #fafcfc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #d0f0f0;
            border-left: 4px solid #7ec4c4;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #3d8585;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(to bottom, #7ec4c4, #a8d5d5);
            border-radius: 2px;
        }

        .horoscope-info {
            line-height: 1.8;
            color: #4a6b6b;
            font-size: 0.95em;
        }

        .quote-section {
            background: linear-gradient(135deg, #e6f7f7 0%, #d0f0f0 100%);
            border: 2px solid #a8d5d5;
            position: relative;
            overflow: hidden;
        }

        .quote-section::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,80 400,20 600,50 C800,80 1000,20 1200,50 L1200,120 L0,120 Z" fill="rgba(168,213,213,0.3)"/></svg>');
            background-size: cover;
            pointer-events: none;
        }

        .ocean-quote {
            text-align: center;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        .quote-text {
            font-size: 1.1em;
            font-style: italic;
            color: #2d6666;
            line-height: 1.8;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .quote-text::before {
            content: '"';
            font-size: 2em;
            color: #7ec4c4;
            opacity: 0.5;
            position: relative;
            top: 10px;
            margin-right: 5px;
        }

        .quote-text::after {
            content: '"';
            font-size: 2em;
            color: #7ec4c4;
            opacity: 0.5;
            position: relative;
            top: 10px;
            margin-left: 5px;
        }

        .quote-author {
            font-size: 0.9em;
            color: #5a9999;
            font-weight: 500;
        }

        .horoscope-text {
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .horoscope-matches {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .match-card {
            background: white;
            padding: 15px 10px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #d0f0f0;
        }

        .match-label {
            font-size: 0.8em;
            color: #7a9a9a;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .match-value {
            font-size: 0.95em;
            font-weight: 600;
            color: #3d8585;
        }

        .footer {
            text-align: center;
            color: #7a9a9a;
            font-size: 0.9em;
            padding: 20px 30px 30px;
            border-top: 2px solid #e6f7f7;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C200,20 400,80 600,50 C800,20 1000,80 1200,50 L1200,0 L0,0 Z" fill="%23e6f7f7"/></svg>');
            background-size: cover;
        }

        .loading {
            color: #7a9a9a;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            .header {
                padding: 25px 20px;
            }

            .header-icon {
                width: 50px;
                height: 50px;
            }

            .header-text h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 30px 20px 20px;
            }

            .counter-section {
                grid-template-columns: 1fr;
            }

            .horoscope-matches {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <img src="kingkong.png" alt="King Kong">
            </div>
            <div class="header-text">
                <h1>你好菱菱！</h1>
                <div class="date" id="currentDate"></div>
            </div>
        </div>

        <div class="content">
            <div class="counter-section">
                <div class="counter-card">
                    <div class="counter-label">從2018年2月19日開始</div>
                    <div class="counter-value" id="daysSince"></div>
                    <div class="counter-years" id="yearsSince"></div>
                </div>
                <div class="counter-card">
                    <div class="counter-label">十週年倒數</div>
                    <div class="counter-value" id="daysUntil"></div>
                </div>
            </div>

            <div class="section quote-section">
                <div class="section-title">今日海語</div>
                <div class="ocean-quote" id="oceanQuote">
                    <div class="loading">載入中...</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">水瓶座運勢</div>
                <div class="horoscope-info" id="horoscopeInfo">
                    <div class="loading">載入運勢資料中...</div>
                </div>
            </div>
        </div>

        <div class="footer">
        </div>
    </div>

    <script>
        // 計算日期
        function calculateDates() {
            const today = new Date();
            const startDate = new Date('2018-02-19');
            const tenYearDate = new Date('2027-11-30');

            // 計算天數差
            const daysSince = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            const daysUntil = Math.floor((tenYearDate - today) / (1000 * 60 * 60 * 24));

            // 計算年數（保留一位小數）
            const yearsSince = (daysSince / 365.25).toFixed(1);

            // 更新頁面
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = today.toLocaleDateString('zh-TW', options);
            document.getElementById('daysSince').textContent = `+${daysSince} 天`;
            document.getElementById('yearsSince').textContent = `${yearsSince} 年`;
            document.getElementById('daysUntil').textContent = `${daysUntil} 天`;
        }

        // 大海 Quotes 集合
        const oceanQuotes = [
            { text: "大海是生命的起源，也是心靈的歸宿", author: "無名" },
            { text: "海浪教會我們，無論多少次被擊倒，都要再次站起", author: "海明威" },
            { text: "大海不會拒絕任何一條河流", author: "中國諺語" },
            { text: "在海邊，時間總是靜止的", author: "無名" },
            { text: "海洋是地球的心跳", author: "雅克·庫斯托" },
            { text: "海能沖刷一切，除了記憶", author: "無名" },
            { text: "人生如同大海，有時平靜，有時洶湧", author: "無名" },
            { text: "海的彼岸，是另一個自己", author: "無名" },
            { text: "聽海的聲音，找回內心的平靜", author: "無名" },
            { text: "大海永遠在那裡，等待著每一個勇敢的靈魂", author: "無名" },
            { text: "海水是鹹的，因為它收藏了太多眼淚", author: "無名" },
            { text: "與海對話，就是與自己的靈魂對話", author: "無名" },
            { text: "海浪來了又去，但大海永遠在那裡", author: "無名" },
            { text: "面對大海，我們都是渺小的", author: "無名" },
            { text: "海的深度，如同心的深度", author: "無名" },
            { text: "每一個浪花，都是大海的吟唱", author: "無名" },
            { text: "海岸線是世界上最美的曲線", author: "無名" },
            { text: "海洋的呼吸，就是地球的呼吸", author: "雅克·庫斯托" },
            { text: "在海邊，所有的煩惱都會被沖走", author: "無名" },
            { text: "大海有答案，如果你願意傾聽", author: "無名" },
            { text: "海是藍色的夢境，永不醒來", author: "無名" },
            { text: "每次看海，都是一次重新出發", author: "無名" },
            { text: "海風帶走憂愁，留下希望", author: "無名" },
            { text: "潮來潮去，唯有大海不變", author: "無名" },
            { text: "海洋教會我們包容與接納", author: "無名" },
            { text: "在海的面前，我們學會謙卑", author: "無名" },
            { text: "海的盡頭，是新的開始", author: "無名" },
            { text: "聽海哭的聲音，也聽海笑的聲音", author: "無名" },
            { text: "每一滴海水，都有自己的故事", author: "無名" },
            { text: "大海是最好的療癒師", author: "無名" },
            { text: "站在海邊，就是站在世界的邊緣", author: "無名" }
        ];

        // 根據日期選擇 Quote（每天不同）
        function loadOceanQuote() {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const quoteIndex = dayOfYear % oceanQuotes.length;
            const quote = oceanQuotes[quoteIndex];

            document.getElementById('oceanQuote').innerHTML = `
                <div class="quote-text">${quote.text}</div>
                <div class="quote-author">— ${quote.author}</div>
            `;
        }

        // 載入運勢
        function loadHoroscope() {
            document.getElementById('horoscopeInfo').innerHTML = `
                <div class="horoscope-text">
                    宇宙正在發生一個深遠但微妙的轉變，將在接下來的七個月影響你。主要主題是<strong>解放</strong> — 你可能需要從某個團體或限制性的情況中釋放自己。創新的氛圍正在醞釀，所以請擁抱新的想法和方法。這是一個完成的時刻（今日塔羅牌：世界），並為新的開始做準備。
                </div>
                <div class="horoscope-matches">
                    <div class="match-card">
                        <div class="match-label">愛情</div>
                        <div class="match-value">射手座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">友情</div>
                        <div class="match-value">雙子座</div>
                    </div>
                    <div class="match-card">
                        <div class="match-label">事業</div>
                        <div class="match-value">獅子座</div>
                    </div>
                </div>
            `;
        }

        // 頁面載入時執行
        calculateDates();
        loadOceanQuote();
        loadHoroscope();
    </script>
</body>
</html>
